fragment PromptGenerationFields on PromptGenerationResult {
  promptGeneration {
    id
    status
    generatedPrompt
    errorMessage
    inputs {
      name
      purpose
      audience
      language
      tone
      format
      offLimits
      fallback
      escalation
    }
  }
}

fragment ErrorFields on PromptGenerationResult {
  errors {
    key
    message
  }
}

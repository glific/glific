query AiEvaluations($filter: AiEvaluationFilter, $opts: Opts) {
  aiEvaluations(filter: $filter, opts: $opts) {
    id
    name
    status
    failureReason
    results
    goldenQa {
      id
      name
      duplicationFactor
    }
    assistantConfigVersion {
      id
      versionNumber
      assistant {
        id
        name
      }
    }
    insertedAt
    updatedAt
  }
}

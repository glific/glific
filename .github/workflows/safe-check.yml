name: Safe Check

on:
  schedule:
    # Every Monday at 8:00 AM IST (02:30 UTC)
    - cron: "30 2 * * 1"
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      matrix:
        elixir: [1.18.3]
        otp: [27.3.3]

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Retrieve Mix Dependencies Cache
        uses: actions/cache@v4
        id: mix-cache
        with:
          path: deps
          key: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-v2.3-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}

      - name: Install Mix Dependencies if not Cached
        if: steps.mix-cache.outputs.cache-hit != 'true'
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix hex.repo add oban https://getoban.pro/repo \
            --fetch-public-key ${{ secrets.OBAN_PUBLIC_KEY }} \
            --auth-key ${{ secrets.OBAN_PRO_KEY }}
          mix deps.get

      - name: Retrieve Build Cache
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-v2.3-build-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-v2.3-build-

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Persist build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: _build

  safe-check:
    runs-on: ubuntu-latest
    needs: compile
    container:
      image: erlangsolutions/safe:latest-ex-1.18
    steps:
      - uses: actions/checkout@v4

      - name: Download _build directory
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: _build
      - run: safe analyse
        env:
          SAFE_LICENSE: ${{ secrets.SAFE_LICENSE }}
      - name: Ensure results file exists
        if: always()
        run: |
          mkdir -p _results
          if [ ! -f _results/Glific.safe ]; then
            echo "SAFE analysis did not produce output — check the safe analyse step for errors" > _results/Glific.safe
          fi

      - name: Persist results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-safe-results
          path: _results/Glific.safe

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SAFE_CHECK_DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "SAFE Check Failed",
                "description": "The weekly SAFE analysis encountered an issue. [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                "color": 15158332
              }]
            }'
